name: CI

on:
  push:
    branches: [ "main" , "next" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}

    # The build is -std=c23; ubuntu-latest defaults to GCC 13,
    # which lacks the c23 spelling.  Makefile has CC ?= gcc, so
    # the env var reaches every make, including the examples
    # smoke-test rebuild.
    env:
      CC: gcc-14

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install toolchain, MPI and HDF5
        run: |
          sudo apt update
          sudo apt install gcc-14
          sudo apt install libopenmpi-dev openmpi-common
          sudo apt install libhdf5-dev
          sudo apt install python3-h5py python3-numpy
      - name: Build
        run: |
          make
      - name: Run tests
        run: |
          make check
      - name: Build shared library
        run: |
          make distclean
          make shared
      - name: Install Python package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -e ".[test,examples,prep]"
      - name: Run Python tests
        run: |
          .venv/bin/pytest -v
      - name: Smoke-test the examples
        run: |
          mpirun -n 2 .venv/bin/python examples/pauli_rotation.py
          # The shared-library step ran `make distclean`, removing the
          # ph2run binary the pipeline needs; rebuild it.
          make
          make -C examples/simul/trott PYTHON="$PWD/.venv/bin/python" \
               TROTT_STEPS=256 MPI_RANKS=2 PHASE2_LOG=warn
          .venv/bin/python - <<'EOF'
          line = open("examples/simul/trott/simul.h5.proc").read()
          e = float(line.split(",")[0])
          assert -80.0 < e < -70.0, f"trott energy {e} out of band"
          print(f"examples smoke OK: trott E={e:.3f} Ha")
          EOF

